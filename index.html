<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Dövme Tasarım Stüdyosu</title>
</head>
<body>
    <header>
        <h1>TASARIM PORTFOLYOM</h1>
        <a href="profil.html" class="profile-link">Profilim & İletişim</a>
    </header>

    <nav class="filters">
        <button>Tümü</button>
        <button>Minimalist</button>
        <button>Realistik</button>
        <button>Geometrik</button>
    </nav>

    <main class="gallery">
    <div class="design-card" data-category="minimalist">
    <img src="images1.png" alt="Minimalist Tasarım" style="width:100%; height:100%; object-fit:cover;">
    </div>
    <div class="design-card" data-category="realistik">Realistik Dövme 1</div>
    <div class="design-card" data-category="minimalist">Minimalist Dövme 2</div>
    </main>
    <script>
    const buttons = document.querySelectorAll('.filters button');
    const cards = document.querySelectorAll('.design-card');

    buttons.forEach(button => {
        button.addEventListener('click', () => {
            const category = button.textContent.toLowerCase();
            
            cards.forEach(card => {
                if (category === 'tümü' || card.dataset.category === category) {
                    card.style.display = 'flex'; // Görünür yap
                } else {
                    card.style.display = 'none'; // Gizle
                }
            });
        });
    });
    </script>
</body>
</html>
